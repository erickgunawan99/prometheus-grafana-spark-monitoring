# =====================================================
# Spark Metrics Configuration for JMX Prometheus Exporter
# =====================================================

# Enable JMX Sink → This is the MOST IMPORTANT part
# This makes Spark register executor, shuffle, task, BlockManager, etc. metrics into JMX
*.sink.jmx.class=org.apache.spark.metrics.sink.JmxSink
*.sink.jmx.period=10
*.sink.jmx.unit=seconds

# Enable JVM metrics source (good to have)
*.source.jvm.class=org.apache.spark.metrics.source.JvmSource

# Optional: Per-component overrides (usually not needed, but harmless)
executor.source.jvm.class=org.apache.spark.metrics.source.JvmSource
driver.source.jvm.class=org.apache.spark.metrics.source.JvmSource

# =====================================================
# PrometheusServlet (optional - only if you also want /metrics/prometheus on Spark UI port 4040)
# You can keep it, but it's separate from the JMX exporter on port 7072
# =====================================================
*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
*.sink.prometheusServlet.path=/metrics/prometheus

# =====================================================
# Optional debugging sinks (uncomment only when needed)
# =====================================================
# *.sink.console.class=org.apache.spark.metrics.sink.ConsoleSink
# *.sink.console.period=30
# *.sink.console.unit=seconds

# *.sink.csv.class=org.apache.spark.metrics.sink.CsvSink
# *.sink.csv.period=10
# *.sink.csv.unit=seconds
# *.sink.csv.directory=/tmp/spark-metrics