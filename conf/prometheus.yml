scrape_configs:

  # ── JMX exporters (CPU, threads, detailed JVM) ───────────────
  - job_name: 'spark-master-jmx'
    static_configs:
      - targets: ['spark-master:7071']
        labels:
          component: 'master'
          instance: 'spark-master'

  - job_name: 'spark-workers-jmx'
    static_configs:
      - targets:
          - 'spark-worker-1:7072'
          - 'spark-worker-2:7073'
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.+):\d+'
        target_label: instance
        replacement: '$1'

  # ── Spark Master native servlet ───────────────────────────────
  - job_name: 'spark-master-metrics'
    honor_labels: true
    metrics_path: '/metrics/master/prometheus'
    static_configs:
      - targets: ['spark-master:8080']
        labels:
          component: 'master'
          instance: 'spark-master'

  - job_name: 'spark-worker-1-metrics'
    honor_labels: true
    metrics_path: '/metrics/worker/prometheus'
    static_configs:
      - targets: ['spark-worker-1:8081']
        labels:
          component: 'worker-1'
          instance: 'spark-worker-1'

  - job_name: 'spark-worker-2-metrics'
    honor_labels: true
    metrics_path: '/metrics/worker/prometheus'
    static_configs:
      - targets: ['spark-worker-2:8082']
        labels:
          component: 'worker-2'
          instance: 'spark-worker-2'

  # ── Spark Applications servlet ────────────────────────────────
  - job_name: 'spark-applications-metrics'
    honor_labels: true
    metrics_path: '/metrics/applications/prometheus'
    static_configs:
      - targets: ['spark-master:8080']

  # ── Spark Driver (only while job runs) ────────────────────────
  - job_name: 'spark-driver'
    honor_labels: true
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['spark-master:4040']

  # ── Spark Executor native Prometheus ──────────────────────────
  - job_name: 'spark-executors'
    honor_labels: true
    metrics_path: '/metrics/executors/prometheus'
    static_configs:
      - targets: ['spark-master:4040']

  # ── Prometheus self-monitoring ────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'