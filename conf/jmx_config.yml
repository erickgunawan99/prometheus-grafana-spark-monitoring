startDelaySeconds: 0
ssl: false
lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  # JVM metrics
  - pattern: 'java.lang<type=Memory><HeapMemoryUsage>(\w+)'
    name: jvm_memory_heap_$1_bytes
    help: "JVM heap memory usage in bytes"
    labels:
      area: heap

  - pattern: 'java.lang<type=Memory><NonHeapMemoryUsage>(\w+)'
    name: jvm_memory_nonheap_$1_bytes
    help: "JVM non-heap memory usage in bytes"
    labels:
      area: nonheap

  - pattern: 'java.lang<type=GarbageCollector, name=(.+)><>CollectionCount'
    name: jvm_gc_collection_count_total
    help: "Total number of GC collections"
    type: COUNTER
    labels:
      gc: $1

  - pattern: 'java.lang<type=GarbageCollector, name=(.+)><>CollectionTime'
    name: jvm_gc_collection_seconds_total
    help: "Total time spent in GC (seconds)"
    type: COUNTER
    valueFactor: 0.001
    labels:
      gc: $1

  - pattern: 'java.lang<type=Threading><>(\w+ThreadCount)'
    name: jvm_threads_$1
    help: "JVM thread counts"

  - pattern: 'java.lang<type=Threading><>TotalStartedThreadCount'
    name: jvm_threads_started_total
    type: COUNTER

  - pattern: 'java.lang<type=OperatingSystem><>ProcessCpuLoad'
    name: jvm_process_cpu_load_ratio
    help: "Process CPU load (0.0 to 1.0)"

  - pattern: 'java.lang<type=OperatingSystem><>SystemCpuLoad'
    name: jvm_system_cpu_load_ratio
    help: "System CPU load (0.0 to 1.0)"

  - pattern: 'java.lang<type=OperatingSystem><>OpenFileDescriptorCount'
    name: jvm_open_file_descriptors
    help: "Number of open file descriptors"

  - pattern: 'java.nio<type=BufferPool, name=(.+)><>(\w+)'
    name: jvm_buffer_pool_$2
    labels:
      pool: $1